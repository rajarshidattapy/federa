services:
  coordinator:
    build: .
    ports:
      - "8000:8000"
    environment:
      FEDERA_COORDINATOR_HOST: "0.0.0.0"
      FEDERA_COORDINATOR_PORT: "8000"
      FEDERA_COORDINATOR_MIN_CLIENTS_PER_ROUND: "2"
      FEDERA_COORDINATOR_ROUNDS: "5"
      FEDERA_COORDINATOR_CHECKPOINT_DIR: "/app/checkpoints"
    volumes:
      - checkpoints:/app/checkpoints
    command: ["python", "-m", "examples.mnist_fedavg.server"]

  client-0:
    build: .
    depends_on:
      - coordinator
    volumes:
      - mnist-data:/app/data
    command:
      [
        "python", "-m", "examples.mnist_fedavg.client",
        "--server", "ws://coordinator:8000",
        "--client-id", "0",
        "--num-clients", "2",
      ]

  client-1:
    build: .
    depends_on:
      - coordinator
    volumes:
      - mnist-data:/app/data
    command:
      [
        "python", "-m", "examples.mnist_fedavg.client",
        "--server", "ws://coordinator:8000",
        "--client-id", "1",
        "--num-clients", "2",
      ]

volumes:
  mnist-data:
  checkpoints:
